<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Engineering Insights Dashboard</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      overflow: hidden;
    }

    /* ============================================
       HEADER
    ============================================ */

    .header {
      background: #111827;
      color: white;
      padding: 16px 24px;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    /* ============================================
       MAIN CONTAINER
    ============================================ */

    .container {
      display: flex;
      height: calc(100vh - 64px);
    }

    /* ============================================
       SIDEBAR
    ============================================ */

    .sidebar {
      width: 250px;
      background: #1f2937;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    .sidebar button {
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #374151;
      color: white;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
      text-align: left;
    }

    .sidebar button:hover,
    .sidebar button.active {
      background: #2563eb;
      transform: translateX(4px);
    }

    /* ============================================
       CONTENT AREA
    ============================================ */

    .content {
      flex: 1;
      background: white;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ============================================
       FOOTER
    ============================================ */

    .footer {
      position: absolute;
      bottom: 15px;
      left: 20px;
      color: #9ca3af;
      font-size: 12px;
    }

  </style>
</head>

<body>

  <!-- ============================================
       HEADER
  ============================================= -->

  <div class="header">
    Engineering Insights Dashboard
  </div>

  <!-- ============================================
       MAIN LAYOUT
  ============================================= -->

  <div class="container">

    <!-- ============================================
         SIDEBAR
    ============================================= -->

    <div class="sidebar">

      <button
        class="active"
        onclick="loadPage('pages/bitbucket-metrics.html', this)">
        📊 BitBucket Metrics
      </button>

      <button
        onclick="loadPage('pages/sprint-dashboard.html', this)">
        🚀 Sprint Dashboard
      </button>

      <button
        onclick="loadPage('pages/ticket-analytics.html', this)">
        🎯 Ticket Analytics
      </button>

      <div class="footer">
        Powered by AI Automation
      </div>

    </div>

    <!-- ============================================
         CONTENT AREA
    ============================================= -->

    <div class="content">

      <iframe
        id="dashboardFrame"
        src="pages/bitbucket-metrics.html">
      </iframe>

    </div>

  </div>

  <!-- ============================================
       JAVASCRIPT
  ============================================= -->

  <script>

    function loadPage(page, button) {

      // Load page into iframe
      document.getElementById("dashboardFrame").src = page;

      // Remove active class from all buttons
      const buttons = document.querySelectorAll(".sidebar button");

      buttons.forEach(btn => {
        btn.classList.remove("active");
      });

      // Add active class to selected button
      if (button) {
        button.classList.add("active");
      }
    }

    // Set first button active on page load
    window.onload = function () {

      const firstButton =
        document.querySelector(".sidebar button");

      if (firstButton) {
        firstButton.classList.add("active");
      }

    };

  </script>

</body>

</html>

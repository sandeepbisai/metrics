<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Engineering Insights Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f7fb;
      overflow: hidden;
    }

    /* ============================================
       HEADER
    ============================================ */
    .header {
      background: #111827;
      color: white;
      padding: 16px 24px;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-tag {
      font-size: 12px;
      background: #2563eb;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ============================================
       MAIN CONTAINER
    ============================================ */
    .container {
      display: flex;
      height: calc(100vh - 61px);
    }

    /* ============================================
       SIDEBAR
    ============================================ */
    .sidebar {
      width: 280px;
      background: #1f2937;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      border-right: 1px solid #374151;
    }

    .sidebar-section-title {
      color: #9ca3af;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
      margin-bottom: 4px;
      padding-left: 6px;
    }

    .sidebar button {
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      background: #374151;
      color: #e5e7eb;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar button:hover {
      background: #4b5563;
      color: white;
      transform: translateX(4px);
    }

    .sidebar button.active {
      background: #2563eb;
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }

    /* ============================================
       CONTENT AREA
    ============================================ */
    .content {
      flex: 1;
      background: white;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ============================================
       FOOTER
    ============================================ */
    .footer {
      position: absolute;
      bottom: 15px;
      left: 20px;
      color: #9ca3af;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="header">
    <span>Engineering Insights Dashboard</span>
    <span class="header-tag">Live Metrics</span>
  </div>

  <div class="container">

    <div class="sidebar">

      <div class="sidebar-section-title">Core Performance</div>

      <button class="active"
        onclick="loadPage('pages/engineering_performance_comparison.html', this)">
        📈 Performance Comparison
      </button>

      <div class="sidebar-section-title">Analytics Reports</div>

      <button onclick="loadPage('pages/ticket-analytics May.html', this)">
        🎯 Ticket Analytics (May)
      </button>

      <button onclick="loadPage('pages/sprint-dashboard May.html', this)">
        🚀 Sprint Dashboard (May)
      </button>

      <button onclick="loadPage('pages/bitbucket-metrics May.html', this)">
        📊 BitBucket Metrics (May)
      </button>

      <button onclick="loadPage('pages/aimetrics.html', this)">
        🤖 AI Engineering Metrics
      </button>

      <div class="sidebar-section-title">Archives</div>

      <button onclick="loadPage('pages/ticket-analytics April.html', this)">
        📁 Ticket Analytics (April)
      </button>

      <button onclick="loadPage('pages/sprint-dashboard April.html', this)">
        📁 Sprint Dashboard (April)
      </button>

      <button onclick="loadPage('pages/bitbucket-metrics April.html', this)">
        📁 BitBucket Metrics (April)
      </button>

      <div class="footer">
        Powered by AI Automation
      </div>

    </div>

    <div class="content">
      <iframe
        id="dashboardFrame"
        src="pages/engineering_performance_comparison.html">
      </iframe>
    </div>

  </div>

  <script>
    function loadPage(page, button) {
      // Load page into iframe
      document.getElementById("dashboardFrame").src = page;

      // Remove active class from all buttons
      document.querySelectorAll(".sidebar button")
        .forEach(btn => btn.classList.remove("active"));

      // Set active button
      button.classList.add("active");
    }

    // Ensure first button stays active on page load
    window.onload = function () {
      const firstButton = document.querySelector(".sidebar button");
      if (firstButton) {
        firstButton.classList.add("active");
      }
    };
  </script>

</body>

</html>
